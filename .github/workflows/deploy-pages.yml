name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          cp index.html .nojekyll CNAME _site/ 2>/dev/null || true
          cp -R assets _site/ 2>/dev/null || true
          cp -R gary-tracker _site/ 2>/dev/null || true
          cp BSCG_Business_Owner_Tax_Strategy_Fact_Finder.pdf _site/ 2>/dev/null || true
          # CNAME is required for custom domain (factfinder.blacksandcapitalgrp.com)
          test -f CNAME && cp CNAME _site/

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4